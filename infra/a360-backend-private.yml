AWSTemplateFormatVersion: "2010-09-09"
Description: A360 Backend application stack - public ALB and private EC2 ASG using shared infrastructure exports.

Parameters:
  ProjectName:
    Type: String
    Default: a360-assistant
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  ContainerImage:
    Type: String
    Description: Backend Docker image URI. Use a Git commit SHA tag.
  FrontendOrigins:
    Type: String
    Default: "http://localhost:5173,http://127.0.0.1:5173"
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues: [t3.small, t3.medium, t3.large, t3.xlarge]
  DesiredCapacity:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 4
  MaxCapacity:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 6
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
  CertificateArn:
    Type: String
    Default: ""
  GithubToken:
    Type: String
    Default: ""
    NoEcho: true
  GithubUsername:
    Type: String
    Default: ""
    Description: GitHub username that owns the GHCR read token.
    AllowedPattern: "^$|^[A-Za-z0-9_.-]+$"
  OpenAiApiKey:
    Type: String
    Default: ""
    NoEcho: true
  VoyageApiKey:
    Type: String
    Default: ""
    NoEcho: true
  JwtSecret:
    Type: String
    Default: ""
    NoEcho: true
  OpsApiKey:
    Type: String
    Default: ""
    NoEcho: true
    AllowedPattern: "^$|^[A-Za-z0-9_-]{32,128}$"
  AssuranceWriterToken:
    Type: String
    Default: ""
    NoEcho: true
    AllowedPattern: "^$|^[A-Za-z0-9_-]{32,128}$"
  AssuranceWriterRepository:
    Type: String
    Default: Metanet-Final-01/A360-Assistant-Backend
    AllowedPattern: "^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$"
  BackendPort:
    Type: Number
    Default: 8000
  ExternalOpenSearchHost:
    Type: String
    NoEcho: true
    AllowedPattern: "^https?://[^\\s]+$"
    ConstraintDescription: ExternalOpenSearchHost must be a non-empty http(s) URL without whitespace.
  StartBackendContainer:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Set false for the first deployment when DB roles still need manual bootstrap from the EC2 host.
  LogRetentionDays:
    Type: Number
    Default: 14

Conditions:
  HasCertificate: !Not [!Equals [!Ref CertificateArn, ""]]
  StartsBackendContainer: !Equals [!Ref StartBackendContainer, "true"]

Resources:
  AppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${ProjectName}/${Environment}/backend-app"
      SecretString: !Sub |
        {
          "OPENAI_API_KEY": "${OpenAiApiKey}",
          "GITHUB_TOKEN": "${GithubToken}",
          "GITHUB_USERNAME": "${GithubUsername}",
          "VOYAGE_API_KEY": "${VoyageApiKey}",
          "JWT_SECRET": "${JwtSecret}",
          "OPS_API_KEY": "${OpsApiKey}",
          "ASSURANCE_WRITER_TOKEN": "${AssuranceWriterToken}",
          "ASSURANCE_WRITER_REPOSITORY": "${AssuranceWriterRepository}"
        }

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public Backend ALB security group
      VpcId:
        Fn::ImportValue:
          Fn::Sub: "${ProjectName}-${Environment}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Backend EC2 security group
      VpcId:
        Fn::ImportValue:
          Fn::Sub: "${ProjectName}-${Environment}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref BackendPort
          ToPort: !Ref BackendPort
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  BackendToServiceRdsIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId:
        Fn::ImportValue:
          Fn::Sub: "${ProjectName}-${Environment}-ServiceDbSecurityGroupId"
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref AppSecurityGroup

  BackendToObservabilityRdsIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId:
        Fn::ImportValue:
          Fn::Sub: "${ProjectName}-${Environment}-ObservabilityDbSecurityGroupId"
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref AppSecurityGroup

  BackendToRagRdsIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId:
        Fn::ImportValue:
          Fn::Sub: "${ProjectName}-${Environment}-RagDbSecurityGroupId"
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref AppSecurityGroup

  BackendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/a360/${Environment}/backend"
      RetentionInDays: !Ref LogRetentionDays

  AppInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: backend-runtime-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub "${BackendLogGroup.Arn}:*"
              - Effect: Allow
                Action:
                  - cloudformation:SignalResource
                Resource: !Ref AWS::StackId
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: "*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref AppSecret
                  - Fn::ImportValue:
                      Fn::Sub: "${ProjectName}-${Environment}-ServiceRdsSecretArn"
                  - Fn::ImportValue:
                      Fn::Sub: "${ProjectName}-${Environment}-ObservabilityRdsSecretArn"
                  - Fn::ImportValue:
                      Fn::Sub: "${ProjectName}-${Environment}-RagRdsSecretArn"
                  - Fn::ImportValue:
                      Fn::Sub: "${ProjectName}-${Environment}-ServiceAppSecretArn"
                  - Fn::ImportValue:
                      Fn::Sub: "${ProjectName}-${Environment}-ObservabilityWriterSecretArn"
                  - Fn::ImportValue:
                      Fn::Sub: "${ProjectName}-${Environment}-OpsReaderSecretArn"
                  - Fn::ImportValue:
                      Fn::Sub: "${ProjectName}-${Environment}-RagRuntimeSecretArn"
                  - Fn::ImportValue:
                      Fn::Sub: "${ProjectName}-${Environment}-RagIngestSecretArn"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - Fn::Sub:
                      - "arn:${AWS::Partition}:s3:::${BucketName}"
                      - BucketName:
                          Fn::ImportValue:
                            Fn::Sub: "${ProjectName}-${Environment}-ArtifactBucketName"
                  - Fn::Sub:
                      - "arn:${AWS::Partition}:s3:::${BucketName}/*"
                      - BucketName:
                          Fn::ImportValue:
                            Fn::Sub: "${ProjectName}-${Environment}-ArtifactBucketName"

  AppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref AppInstanceRole]

  AppLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn: !GetAtt AppInstanceProfile.Arn
        MetadataOptions:
          HttpEndpoint: enabled
          HttpTokens: required
        NetworkInterfaces:
          - DeviceIndex: 0
            AssociatePublicIpAddress: false
            Groups: [!Ref AppSecurityGroup]
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: 40
              VolumeType: gp3
              Encrypted: true
        UserData:
          Fn::Base64: !Sub
            - |
              #!/bin/bash -eu
              set -o pipefail
              exec > >(tee -a /var/log/a360-bootstrap.log /var/log/cloud-init-output.log) 2>&1
              echo "[a360-bootstrap] starting user-data"
              dnf install -y awscli aws-cfn-bootstrap
              INSTANCE_ID=$(curl -fsS http://169.254.169.254/latest/meta-data/instance-id || echo unknown-instance)
              upload_bootstrap_logs() {
                aws s3 cp /var/log/a360-bootstrap.log "s3://${ArtifactBucketName}/backend-bootstrap-logs/${AWS::StackName}/$INSTANCE_ID/a360-bootstrap.log" || true
                aws s3 cp /var/log/cloud-init-output.log "s3://${ArtifactBucketName}/backend-bootstrap-logs/${AWS::StackName}/$INSTANCE_ID/cloud-init-output.log" || true
              }
              trap 'upload_bootstrap_logs; /opt/aws/bin/cfn-signal --success false --stack ${AWS::StackName} --resource AppAutoScalingGroup --region ${AWS::Region}' ERR

              if [ "${StartBackendContainer}" != "true" ]; then
                dnf install -y postgresql15
                echo "StartBackendContainer=false; leaving EC2 ready for DB bootstrap through SSM."
                /opt/aws/bin/cfn-signal --success true \
                  --stack ${AWS::StackName} \
                  --resource AppAutoScalingGroup \
                  --region ${AWS::Region}
                exit 0
              fi

              dnf install -y docker jq curl postgresql15
              systemctl enable --now docker

              mkdir -p /opt/a360/secrets
              chmod 700 /opt/a360/secrets
              aws secretsmanager get-secret-value --secret-id '${AppSecret}' --query SecretString --output text > /opt/a360/secrets/app.json
              aws secretsmanager get-secret-value --secret-id '${ServiceAppSecretArn}' --query SecretString --output text > /opt/a360/secrets/service.json
              aws secretsmanager get-secret-value --secret-id '${ObservabilityWriterSecretArn}' --query SecretString --output text > /opt/a360/secrets/observability.json
              aws secretsmanager get-secret-value --secret-id '${RagRuntimeSecretArn}' --query SecretString --output text > /opt/a360/secrets/rag.json

              GITHUB_TOKEN=$(jq -r '.GITHUB_TOKEN // ""' /opt/a360/secrets/app.json)
              GITHUB_USERNAME=$(jq -r '.GITHUB_USERNAME // ""' /opt/a360/secrets/app.json)
              if [ -n "$GITHUB_TOKEN" ]; then
                echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_USERNAME" --password-stdin
              fi

              SERVICE_USER=$(jq -r '.username' /opt/a360/secrets/service.json)
              SERVICE_PASSWORD=$(jq -r '.password' /opt/a360/secrets/service.json)
              OBS_USER=$(jq -r '.username' /opt/a360/secrets/observability.json)
              OBS_PASSWORD=$(jq -r '.password' /opt/a360/secrets/observability.json)
              RAG_USER=$(jq -r '.username' /opt/a360/secrets/rag.json)
              RAG_PASSWORD=$(jq -r '.password' /opt/a360/secrets/rag.json)
              OPS_API_KEY=$(jq -r '.OPS_API_KEY // ""' /opt/a360/secrets/app.json)
              ASSURANCE_WRITER_TOKEN=$(jq -r '.ASSURANCE_WRITER_TOKEN // ""' /opt/a360/secrets/app.json)
              ASSURANCE_WRITER_REPOSITORY=$(jq -r '.ASSURANCE_WRITER_REPOSITORY // ""' /opt/a360/secrets/app.json)

              install -m 600 /dev/null /opt/a360/.env
              cat > /opt/a360/.env <<EOF
              APP_ENV=${Environment}
              FRONTEND_ORIGINS=${FrontendOrigins}
              AWS_REGION=${AWS::Region}
              DOCUMENT_BUCKET=${ArtifactBucketName}
              DATABASE_HOST=${ServiceDbEndpoint}
              DATABASE_PORT=5432
              DATABASE_NAME=${ServiceDbName}
              DATABASE_USERNAME=$SERVICE_USER
              DATABASE_PASSWORD=$SERVICE_PASSWORD
              OBSERVABILITY_DATABASE_URL=postgresql://$OBS_USER:$OBS_PASSWORD@${ObservabilityDbEndpoint}:5432/${ObservabilityDbName}?sslmode=require
              RAG_DATABASE_URL=postgresql://$RAG_USER:$RAG_PASSWORD@${RagDbEndpoint}:5432/${RagDbName}?sslmode=require
              OPENSEARCH_HOST=${ExternalOpenSearchHost}
              OPS_API_KEY=$OPS_API_KEY
              ASSURANCE_WRITER_TOKEN=$ASSURANCE_WRITER_TOKEN
              ASSURANCE_WRITER_REPOSITORY=$ASSURANCE_WRITER_REPOSITORY
              EOF
              jq -r 'to_entries[] | select((.key == "OPS_API_KEY" or .key == "ASSURANCE_WRITER_TOKEN" or .key == "ASSURANCE_WRITER_REPOSITORY") | not) | "\(.key)=\(.value)"' /opt/a360/secrets/app.json >> /opt/a360/.env

              docker rm -f a360-backend || true
              docker run -d --restart unless-stopped --name a360-backend \
                -p ${BackendPort}:${BackendPort} \
                --env-file /opt/a360/.env \
                --log-driver awslogs --log-opt awslogs-region=${AWS::Region} --log-opt awslogs-group=${BackendLogGroup} \
                ${ContainerImage}

              for attempt in $(seq 1 60); do
                if curl -fsS --max-time 5 "http://localhost:${BackendPort}/health/live" >/dev/null; then
                  /opt/aws/bin/cfn-signal --success true \
                    --stack ${AWS::StackName} \
                    --resource AppAutoScalingGroup \
                    --region ${AWS::Region}
                  upload_bootstrap_logs
                  exit 0
                fi
                sleep 5
              done
              exit 1
            - ArtifactBucketName:
                Fn::ImportValue:
                  Fn::Sub: "${ProjectName}-${Environment}-ArtifactBucketName"
              ServiceDbEndpoint:
                Fn::ImportValue:
                  Fn::Sub: "${ProjectName}-${Environment}-ServiceDbEndpoint"
              ServiceDbName:
                Fn::ImportValue:
                  Fn::Sub: "${ProjectName}-${Environment}-ServiceDbName"
              ObservabilityDbEndpoint:
                Fn::ImportValue:
                  Fn::Sub: "${ProjectName}-${Environment}-ObservabilityDbEndpoint"
              ObservabilityDbName:
                Fn::ImportValue:
                  Fn::Sub: "${ProjectName}-${Environment}-ObservabilityDbName"
              RagDbEndpoint:
                Fn::ImportValue:
                  Fn::Sub: "${ProjectName}-${Environment}-RagDbEndpoint"
              RagDbName:
                Fn::ImportValue:
                  Fn::Sub: "${ProjectName}-${Environment}-RagDbName"
              ServiceAppSecretArn:
                Fn::ImportValue:
                  Fn::Sub: "${ProjectName}-${Environment}-ServiceAppSecretArn"
              ObservabilityWriterSecretArn:
                Fn::ImportValue:
                  Fn::Sub: "${ProjectName}-${Environment}-ObservabilityWriterSecretArn"
              RagRuntimeSecretArn:
                Fn::ImportValue:
                  Fn::Sub: "${ProjectName}-${Environment}-RagRuntimeSecretArn"

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Type: application
      SecurityGroups: [!Ref AlbSecurityGroup]
      Subnets:
        Fn::Split:
          - ","
          - Fn::ImportValue:
              Fn::Sub: "${ProjectName}-${Environment}-PublicSubnetIds"
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: "120"

  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId:
        Fn::ImportValue:
          Fn::Sub: "${ProjectName}-${Environment}-VpcId"
      Protocol: HTTP
      Port: !Ref BackendPort
      TargetType: instance
      HealthCheckPath: /health/live
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  HttpChangeReceiptRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values: [/api/internal/assurance/change-receipts]
      Actions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  HttpInternalBlockRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpListener
      Priority: 20
      Conditions:
        - Field: path-pattern
          Values: [/api/internal/*]
      Actions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: "403"
            ContentType: text/plain
            MessageBody: forbidden

  HttpAdminBlockRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpListener
      Priority: 30
      Conditions:
        - Field: path-pattern
          Values: [/api/admin/*]
      Actions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: "403"
            ContentType: text/plain
            MessageBody: forbidden

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  HttpsChangeReceiptRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Condition: HasCertificate
    Properties:
      ListenerArn: !Ref HttpsListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values: [/api/internal/assurance/change-receipts]
      Actions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  HttpsInternalBlockRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Condition: HasCertificate
    Properties:
      ListenerArn: !Ref HttpsListener
      Priority: 20
      Conditions:
        - Field: path-pattern
          Values: [/api/internal/*]
      Actions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: "403"
            ContentType: text/plain
            MessageBody: forbidden

  HttpsAdminBlockRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Condition: HasCertificate
    Properties:
      ListenerArn: !Ref HttpsListener
      Priority: 30
      Conditions:
        - Field: path-pattern
          Values: [/api/admin/*]
      Actions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: "403"
            ContentType: text/plain
            MessageBody: forbidden

  AppAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    CreationPolicy:
      ResourceSignal:
        Count: !Ref DesiredCapacity
        Timeout: PT15M
    UpdatePolicy:
      AutoScalingRollingUpdate:
        MinInstancesInService: 1
        MaxBatchSize: 1
        PauseTime: PT15M
        WaitOnResourceSignals: true
    Properties:
      MinSize: 1
      DesiredCapacity: !Ref DesiredCapacity
      MaxSize: !Ref MaxCapacity
      VPCZoneIdentifier:
        Fn::Split:
          - ","
          - Fn::ImportValue:
              Fn::Sub: "${ProjectName}-${Environment}-PrivateAppSubnetIds"
      TargetGroupARNs: !If
        - StartsBackendContainer
        - [!Ref BackendTargetGroup]
        - !Ref AWS::NoValue
      HealthCheckType: !If [StartsBackendContainer, ELB, EC2]
      HealthCheckGracePeriod: !If [StartsBackendContainer, 300, !Ref AWS::NoValue]
      LaunchTemplate:
        LaunchTemplateId: !Ref AppLaunchTemplate
        Version: !GetAtt AppLaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-backend"
          PropagateAtLaunch: true
        - Key: Project
          Value: !Ref ProjectName
          PropagateAtLaunch: true
        - Key: Environment
          Value: !Ref Environment
          PropagateAtLaunch: true

Outputs:
  AlbDnsName:
    Value: !GetAtt ApplicationLoadBalancer.DNSName
  BackendHttpUrl:
    Value: !Sub "http://${ApplicationLoadBalancer.DNSName}"
  BackendHttpsUrl:
    Condition: HasCertificate
    Value: !Sub "https://${ApplicationLoadBalancer.DNSName}"
  BackendSecurityGroupId:
    Value: !Ref AppSecurityGroup
    Export:
      Name: !Sub "${ProjectName}-${Environment}-BackendSecurityGroupId"
