AWSTemplateFormatVersion: "2010-09-09"
Description: "A360 backend AWS deployment - public ALB, private EC2 ASG, private PostgreSQL pgvector-ready RDS, optional private OpenSearch"

Parameters:
  ProjectName:
    Type: String
    Default: a360-assistant
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9-]{2,30}$"

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  ContainerImage:
    Type: String
    Description: "Backend Docker image URI. Example: ghcr.io/org/repo/backend:sha"

  FrontendOrigins:
    Type: String
    Default: "http://localhost:5173,http://127.0.0.1:5173"
    Description: "Comma separated Vue frontend origins for CORS. Replace this with the deployed Vue URL for AWS."

  VpcCidr:
    Type: String
    Default: 10.60.0.0/16

  PublicSubnet1Cidr:
    Type: String
    Default: 10.60.0.0/24

  PublicSubnet2Cidr:
    Type: String
    Default: 10.60.1.0/24

  PrivateAppSubnet1Cidr:
    Type: String
    Default: 10.60.10.0/24

  PrivateAppSubnet2Cidr:
    Type: String
    Default: 10.60.11.0/24

  PrivateDataSubnet1Cidr:
    Type: String
    Default: 10.60.20.0/24

  PrivateDataSubnet2Cidr:
    Type: String
    Default: 10.60.21.0/24

  NetworkMode:
    Type: String
    Default: private
    AllowedValues: [private, public-lite]
    Description: >-
      private (default): app instances in private subnets behind a NAT Gateway (~$32-45/mo fixed cost).
      public-lite: app instances in public subnets (still only reachable via the ALB security group),
      no NAT Gateway — cheaper for short-lived test deployments.

  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues: [t3.small, t3.medium, t3.large, t3.xlarge]

  DesiredCapacity:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 4

  MaxCapacity:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 6

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

  KeyPairName:
    Type: String
    Default: ""
    Description: "Optional EC2 key pair. Leave blank and use SSM Session Manager."

  CertificateArn:
    Type: String
    Default: ""
    Description: "Optional ACM certificate ARN for HTTPS listener."

  GithubToken:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Optional GitHub token for pulling private GHCR images."

  AssuranceWriterToken:
    Type: String
    Default: ""
    NoEcho: true
    AllowedPattern: "^$|^[A-Za-z0-9_-]{32,128}$"
    Description: "Dedicated bearer token for the protected Change Assurance writer."

  AssuranceWriterRepository:
    Type: String
    Default: "Metanet-Final-01/A360-Assistant-Backend"
    AllowedPattern: "^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$"
    Description: "Single GitHub repository authorized to publish Change Assurance records."

  DatabaseName:
    Type: String
    Default: a360
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9_]{1,30}$"

  DatabaseInstanceClass:
    Type: String
    Default: db.t4g.micro
    AllowedValues: [db.t4g.micro, db.t4g.small, db.t4g.medium, db.t3.micro, db.t3.small, db.t3.medium]

  DatabaseAllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 20
    MaxValue: 200

  OpenAiApiKey:
    Type: String
    Default: ""
    NoEcho: true

  VoyageApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Optional — enables Voyage reranking. Hybrid search still works without it (falls back to RRF order, no rerank)."

  JwtSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Auth token signing secret. Leave blank only for throwaway test stacks — the app falls back to a well-known insecure dev secret if unset."

  RagDatabaseUrl:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Optional. Shared RAG corpus DB (pgvector) connection string, e.g. Neon. Leave blank only if the app DB already has the ingested rag_documents table — otherwise RAG retrieval falls back to the empty app RDS DB."

  ObservabilityDatabaseUrl:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Optional. Shared llm_usage observability DB connection string, e.g. Neon. Falls back to the app RDS DB if unset."

  AppDatabaseUrl:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Optional. Shared remote app DB connection string, e.g. Neon (app/db.py APP_DATABASE_URL). When set, the private RDS instance is not created at all. Setting this skips automatic schema migration on boot (RPA-186) — apply with scripts/migrate_shared_db.py."

  EnableOpenSearch:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]

  OpenSearchMode:
    Type: String
    Default: managed
    AllowedValues: [managed, container]
    Description: >-
      Only matters when EnableOpenSearch=true. managed (default): AWS::OpenSearchService::Domain,
      t3.small.search always-on (~$26-36/mo fixed, separate from the app instance).
      container: run OpenSearch as a plain container alongside the backend on the same EC2
      instance (same image as local docker-compose) — no extra AWS resource/cost, but shares
      the instance's RAM/CPU (bump InstanceType if using this) and loses its data if the
      instance is replaced (no managed backups/patching either).

  OpenSearchHost:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Optional external OpenSearch endpoint (e.g. Bonsai). Takes priority over EnableOpenSearch/OpenSearchMode when set — no managed or container OpenSearch is needed alongside this."

  OpenSearchUsername:
    Type: String
    Default: ""
    NoEcho: true

  OpenSearchPassword:
    Type: String
    Default: ""
    NoEcho: true

  EnableRagIngestScheduler:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: "Create nested EventBridge Scheduler -> SQS resources for rag-server ingest."

  RagIngestSchedulerTemplateUrl:
    Type: String
    Default: ""
    Description: "S3 URL for ops-server/infra/aws/rag-ingest-scheduler-sqs.yaml when EnableRagIngestScheduler=true."

  RagIngestScheduleExpression:
    Type: String
    Default: "rate(1 minute)"
    Description: "Use rate(1 minute) for integration tests, then switch to cron(...)."

  RagIngestOption:
    Type: Number
    Default: 3
    AllowedValues: [1, 2, 3]

  RagIngestClean:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, ""]]
  HasCertificate: !Not [!Equals [!Ref CertificateArn, ""]]
  HasAppDatabaseUrl: !Not [!Equals [!Ref AppDatabaseUrl, ""]]
  CreateManagedDatabase: !Not [!Condition HasAppDatabaseUrl]
  HasExternalOpenSearch: !Not [!Equals [!Ref OpenSearchHost, ""]]
  CreateOpenSearch: !And [!Not [!Condition HasExternalOpenSearch], !Equals [!Ref EnableOpenSearch, "true"]]
  UseManagedOpenSearch: !And [!Condition CreateOpenSearch, !Equals [!Ref OpenSearchMode, "managed"]]
  UseContainerOpenSearch: !And [!Condition CreateOpenSearch, !Equals [!Ref OpenSearchMode, "container"]]
  IsPublicLite: !Equals [!Ref NetworkMode, "public-lite"]
  NeedsNat: !Not [!Condition IsPublicLite]
  CreateRagIngestScheduler: !Equals [!Ref EnableRagIngestScheduler, "true"]

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-vpc"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-igw"

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: !Ref PublicSubnet1Cidr
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-public-a"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: !Ref PublicSubnet2Cidr
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-public-b"

  PrivateAppSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: !Ref PrivateAppSubnet1Cidr
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-private-app-a"

  PrivateAppSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: !Ref PrivateAppSubnet2Cidr
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-private-app-b"

  PrivateDataSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: !Ref PrivateDataSubnet1Cidr
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-private-data-a"

  PrivateDataSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: !Ref PrivateDataSubnet2Cidr
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-private-data-b"

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-public-rt"

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  NatEip:
    Type: AWS::EC2::EIP
    Condition: NeedsNat
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-nat-eip"

  NatGateway:
    Type: AWS::EC2::NatGateway
    Condition: NeedsNat
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-nat"

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-private-rt"

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Condition: NeedsNat
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateAppSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateAppSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateAppSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateAppSubnet2
      RouteTableId: !Ref PrivateRouteTable

  PrivateDataSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateDataSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateDataSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateDataSubnet2
      RouteTableId: !Ref PrivateRouteTable

  S3Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      RouteTableIds:
        - !Ref PrivateRouteTable
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcEndpointType: Gateway
      VpcId: !Ref Vpc

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public ALB security group
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - Description: HTTP
          IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - Description: HTTPS
          IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-alb-sg"

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Private app instances security group
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - Description: ALB to FastAPI
          IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-app-sg"

  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: CreateManagedDatabase
    Properties:
      GroupDescription: Private PostgreSQL security group
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - Description: App to PostgreSQL
          IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref AppSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-db-sg"

  OpenSearchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: UseManagedOpenSearch
    Properties:
      GroupDescription: Private OpenSearch security group
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - Description: App to OpenSearch HTTPS
          IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref AppSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-opensearch-sg"

  DatabaseSecret:
    Type: AWS::SecretsManager::Secret
    Condition: CreateManagedDatabase
    Properties:
      Name: !Sub "${ProjectName}/${Environment}/postgres"
      GenerateSecretString:
        SecretStringTemplate: '{"username":"a360_admin"}'
        GenerateStringKey: password
        ExcludeCharacters: '"@/\'
        PasswordLength: 32
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  AppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${ProjectName}/${Environment}/app"
      SecretString: !Sub |
        {
          "OPENAI_API_KEY": "${OpenAiApiKey}",
          "GITHUB_TOKEN": "${GithubToken}",
          "VOYAGE_API_KEY": "${VoyageApiKey}",
          "JWT_SECRET": "${JwtSecret}",
          "RAG_DATABASE_URL": "${RagDatabaseUrl}",
          "OBSERVABILITY_DATABASE_URL": "${ObservabilityDatabaseUrl}",
          "APP_DATABASE_URL": "${AppDatabaseUrl}",
          "OPENSEARCH_USERNAME": "${OpenSearchUsername}",
          "OPENSEARCH_PASSWORD": "${OpenSearchPassword}",
          "ASSURANCE_WRITER_TOKEN": "${AssuranceWriterToken}",
          "ASSURANCE_WRITER_REPOSITORY": "${AssuranceWriterRepository}"
        }
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  DocumentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: transition-documents
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 60
            ExpirationInDays: 365
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-documents"

  LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: expire-logs
            Status: Enabled
            ExpirationInDays: 180
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-logs"

  DatabaseSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Condition: CreateManagedDatabase
    Properties:
      DBSubnetGroupDescription: Private subnets for PostgreSQL
      SubnetIds:
        - !Ref PrivateDataSubnet1
        - !Ref PrivateDataSubnet2
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-db-subnet-group"

  Database:
    Type: AWS::RDS::DBInstance
    Condition: CreateManagedDatabase
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub "${ProjectName}-${Environment}-postgres"
      Engine: postgres
      DBInstanceClass: !Ref DatabaseInstanceClass
      AllocatedStorage: !Ref DatabaseAllocatedStorage
      StorageType: gp3
      StorageEncrypted: true
      DBName: !Ref DatabaseName
      MasterUsername: !Sub "{{resolve:secretsmanager:${DatabaseSecret}:SecretString:username}}"
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DatabaseSecret}:SecretString:password}}"
      DBSubnetGroupName: !Ref DatabaseSubnetGroup
      VPCSecurityGroups:
        - !Ref DatabaseSecurityGroup
      PubliclyAccessible: false
      BackupRetentionPeriod: 7
      DeletionProtection: false
      AutoMinorVersionUpgrade: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-postgres"

  OpenSearchDomain:
    Type: AWS::OpenSearchService::Domain
    Condition: UseManagedOpenSearch
    Properties:
      DomainName: !Sub "${ProjectName}-${Environment}-search"
      EngineVersion: OpenSearch_2.13
      ClusterConfig:
        InstanceType: t3.small.search
        InstanceCount: 1
        ZoneAwarenessEnabled: false
      EBSOptions:
        EBSEnabled: true
        VolumeSize: 20
        VolumeType: gp3
      EncryptionAtRestOptions:
        Enabled: true
      NodeToNodeEncryptionOptions:
        Enabled: true
      DomainEndpointOptions:
        EnforceHTTPS: true
      VPCOptions:
        SubnetIds:
          - !Ref PrivateDataSubnet1
        SecurityGroupIds:
          - !Ref OpenSearchSecurityGroup
      AccessPolicies:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: "*"
            Action: "es:ESHttp*"
            Resource: !Sub "arn:${AWS::Partition}:es:${AWS::Region}:${AWS::AccountId}:domain/${ProjectName}-${Environment}-search/*"

  AppUserDataLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/${ProjectName}/${Environment}/user-data"
      RetentionInDays: 14

  AppInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: app-runtime-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !If [CreateManagedDatabase, !Ref DatabaseSecret, !Ref "AWS::NoValue"]
                  - !Ref AppSecret
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DocumentBucket.Arn
                  - !Sub "${DocumentBucket.Arn}/*"
                  - !GetAtt LogsBucket.Arn
                  - !Sub "${LogsBucket.Arn}/*"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-app-role"

  AppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref AppInstanceRole

  RagIngestSchedulerStack:
    Type: AWS::CloudFormation::Stack
    Condition: CreateRagIngestScheduler
    Properties:
      TemplateURL: !Ref RagIngestSchedulerTemplateUrl
      Parameters:
        ScheduleName: !Sub "${ProjectName}-${Environment}-rag-ingest"
        ScheduleExpression: !Ref RagIngestScheduleExpression
        ScheduleTimezone: "Asia/Seoul"
        IngestOption: !Ref RagIngestOption
        Clean: !Ref RagIngestClean
        AppInstanceRoleName: !Ref AppInstanceRole

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      LoadBalancerAttributes:
        # CloudFront의 OriginReadTimeout(60초)보다 짧으면 ALB가 먼저 끊어서 같은 증상이
        # 재발한다 — 여유를 두고 그보다 길게(RAG 챗봇 스트림 감안).
        - Key: idle_timeout.timeout_seconds
          Value: "120"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-alb"

  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref Vpc
      Protocol: HTTP
      Port: 8000
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckPath: /api/health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-backend-tg"

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  AppCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${ProjectName}-${Environment} backend HTTPS proxy"
        PriceClass: PriceClass_100
        HttpVersion: http2
        Origins:
          - Id: backend-alb
            DomainName: !GetAtt ApplicationLoadBalancer.DNSName
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
              HTTPPort: 80
              OriginSSLProtocols:
                - TLSv1.2
              # 기본값 30초는 RAG 챗봇 스트림(임베딩+검색+rerank+LLM, Voyage 재시도 시 30초+)에
              # 너무 짧아서 CloudFront가 스트림 도중 끊어버린다(클라이언트엔 HTTP/2 프로토콜
              # 에러로 보임). CloudFront가 허용하는 최댓값(60초)으로 올린다.
              OriginReadTimeout: 60
              OriginKeepaliveTimeout: 60
        DefaultCacheBehavior:
          TargetOriginId: backend-alb
          ViewerProtocolPolicy: https-only
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-cf"

  AppLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Metadata:
      AWS::CloudFormation::Init: {}
    Properties:
      LaunchTemplateName: !Sub "${ProjectName}-${Environment}-app"
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn: !GetAtt AppInstanceProfile.Arn
        KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref AWS::NoValue]
        NetworkInterfaces:
          - DeviceIndex: 0
            AssociatePublicIpAddress: !If [IsPublicLite, true, false]
            Groups:
              - !Ref AppSecurityGroup
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: 40
              VolumeType: gp3
              Encrypted: true
              DeleteOnTermination: true
        UserData:
          Fn::Base64: !Sub
            - |
              #!/bin/bash -eu
              exec > /var/log/user-data.log 2>&1

              dnf install -y amazon-cloudwatch-agent
              mkdir -p /opt/aws/amazon-cloudwatch-agent/etc
              cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json <<'CWEOF'
              {
                "agent": { "run_as_user": "root", "force_flush_interval": 5 },
                "logs": {
                  "logs_collected": {
                    "files": {
                      "collect_list": [
                        {
                          "file_path": "/var/log/user-data.log",
                          "log_group_name": "${AppUserDataLogGroup}",
                          "log_stream_name": "{instance_id}",
                          "retention_in_days": 14
                        }
                      ]
                    }
                  }
                }
              }
              CWEOF
              /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
                -a fetch-config -m ec2 \
                -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s

              dnf update -y
              dnf install -y docker git python3 python3-pip awscli aws-cfn-bootstrap || dnf install -y docker git python3 python3-pip awscli
              systemctl enable docker
              systemctl start docker

              mkdir -p /usr/local/lib/docker/cli-plugins
              curl -fsSL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64" \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

              mkdir -p /opt/a360

              DB_SECRET_ID="${DbSecretId}"
              if [ -n "$DB_SECRET_ID" ]; then
                export DB_SECRET_JSON="$(aws secretsmanager get-secret-value --region ${AWS::Region} --secret-id "$DB_SECRET_ID" --query SecretString --output text)"
                DB_USERNAME=$(python3 -c 'import json, os; print(json.loads(os.environ["DB_SECRET_JSON"])["username"])')
                DB_PASSWORD=$(python3 -c 'import json, os; print(json.loads(os.environ["DB_SECRET_JSON"])["password"])')
              else
                DB_USERNAME=""
                DB_PASSWORD=""
              fi
              export APP_SECRET_JSON="$(aws secretsmanager get-secret-value --region ${AWS::Region} --secret-id ${AppSecret} --query SecretString --output text)"
              OPENAI_API_KEY=$(python3 -c 'import json, os; print(json.loads(os.environ["APP_SECRET_JSON"]).get("OPENAI_API_KEY", ""))')
              GITHUB_TOKEN=$(python3 -c 'import json, os; print(json.loads(os.environ["APP_SECRET_JSON"]).get("GITHUB_TOKEN", ""))')
              VOYAGE_API_KEY=$(python3 -c 'import json, os; print(json.loads(os.environ["APP_SECRET_JSON"]).get("VOYAGE_API_KEY", ""))')
              JWT_SECRET=$(python3 -c 'import json, os; print(json.loads(os.environ["APP_SECRET_JSON"]).get("JWT_SECRET", ""))')
              RAG_DATABASE_URL=$(python3 -c 'import json, os; print(json.loads(os.environ["APP_SECRET_JSON"]).get("RAG_DATABASE_URL", ""))')
              OBSERVABILITY_DATABASE_URL=$(python3 -c 'import json, os; print(json.loads(os.environ["APP_SECRET_JSON"]).get("OBSERVABILITY_DATABASE_URL", ""))')
              APP_DATABASE_URL=$(python3 -c 'import json, os; print(json.loads(os.environ["APP_SECRET_JSON"]).get("APP_DATABASE_URL", ""))')
              OPENSEARCH_USERNAME=$(python3 -c 'import json, os; print(json.loads(os.environ["APP_SECRET_JSON"]).get("OPENSEARCH_USERNAME", ""))')
              OPENSEARCH_PASSWORD=$(python3 -c 'import json, os; print(json.loads(os.environ["APP_SECRET_JSON"]).get("OPENSEARCH_PASSWORD", ""))')
              ASSURANCE_WRITER_TOKEN=$(python3 -c 'import json, os; print(json.loads(os.environ["APP_SECRET_JSON"]).get("ASSURANCE_WRITER_TOKEN", ""))')
              ASSURANCE_WRITER_REPOSITORY=$(python3 -c 'import json, os; print(json.loads(os.environ["APP_SECRET_JSON"]).get("ASSURANCE_WRITER_REPOSITORY", ""))')
              unset DB_SECRET_JSON APP_SECRET_JSON

              if [ -n "$GITHUB_TOKEN" ]; then
                echo "$GITHUB_TOKEN" | docker login ghcr.io -u token --password-stdin
              fi

              install -m 600 /dev/null /opt/a360/.env
              cat > /opt/a360/.env <<EOF
              APP_ENV=${Environment}
              FRONTEND_ORIGINS=${FrontendOrigins}
              AWS_REGION=${AWS::Region}
              DOCUMENT_BUCKET=${DocumentBucket}
              # LOGS_BUCKET 제거 (RPA-189) — 앱 코드가 읽는 곳이 0곳이다.
              # ⚠️ LogsBucket **리소스와 IAM 권한은 유지**한다(S3 버킷 삭제는 파괴적이고,
              #    S3 로그 업로드를 붙일 여지가 있다). 지금 지우는 건 '설정돼 있으니
              #    동작하겠지'라는 오해를 만드는 env 주입뿐이다.
              DATABASE_HOST=${DatabaseHostValue}
              DATABASE_PORT=${DatabasePortValue}
              DATABASE_NAME=${DatabaseName}
              DATABASE_USERNAME=$DB_USERNAME
              DATABASE_PASSWORD=$DB_PASSWORD
              # 설정되면 위 DATABASE_* 대신 이 값을 그대로 씀(app/db.py) — 비어있으면 RDS 사용(미생성 시 위 값 전부 빈 문자열)
              APP_DATABASE_URL=$APP_DATABASE_URL
              OPENAI_API_KEY=$OPENAI_API_KEY
              VOYAGE_API_KEY=$VOYAGE_API_KEY
              JWT_SECRET=$JWT_SECRET
              ASSURANCE_WRITER_TOKEN=$ASSURANCE_WRITER_TOKEN
              ASSURANCE_WRITER_REPOSITORY=$ASSURANCE_WRITER_REPOSITORY
              EMBEDDING_PROVIDER=openai
              # AGENT_RETRIEVER 제거 (RPA-189) — RPA-69가 fake 검색기 분기를 없애면서
              # 코드가 이 값을 읽지 않게 됐다. 남겨두면 '하이브리드가 켜져 있구나'라는
              # 오해만 만든다(fake로 바꿔도 아무 일도 안 일어난다).
              # 검색기 모듈 app/services/agent_retriever.py 자체는 살아 있다 — 이름만 비슷.
              OPENSEARCH_HOST=${OpenSearchHost}
              OPENSEARCH_USERNAME=$OPENSEARCH_USERNAME
              OPENSEARCH_PASSWORD=$OPENSEARCH_PASSWORD
              PDFBOX_JAR_PATH=/opt/pdfbox/pdfbox-app.jar
              RAG_DATABASE_URL=$RAG_DATABASE_URL
              OBSERVABILITY_DATABASE_URL=$OBSERVABILITY_DATABASE_URL
              RAG_SCHEDULER_PROVIDER=${RagSchedulerProvider}
              RAG_INGEST_SQS_QUEUE_URL=${RagIngestQueueUrl}
              RAG_INGEST_SQS_QUEUE_ARN=${RagIngestQueueArn}
              RAG_SERVER_URL=http://127.0.0.1:8200
              RAG_INGEST_OPTION=${RagIngestOption}
              EOF

              cat > /opt/a360/docker-compose.yml <<EOF
              services:
                backend:
                  image: ${ContainerImage}
                  container_name: a360-backend
                  restart: unless-stopped
                  env_file: .env
                  ports:
                    - "8000:8000"
                  healthcheck:
                    test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://localhost:8000/api/health', timeout=3)\nPY"]
                    interval: 30s
                    timeout: 5s
                    retries: 3
              ${OpenSearchComposeBlock}
              EOF

              cd /opt/a360
              docker compose pull
              docker compose up -d

              /opt/aws/bin/cfn-signal -e 0 \
                --stack ${AWS::StackName} \
                --resource AppAutoScalingGroup \
                --region ${AWS::Region}
            - DbSecretId: !If [CreateManagedDatabase, !Ref DatabaseSecret, ""]
              DatabaseHostValue: !If [CreateManagedDatabase, !GetAtt Database.Endpoint.Address, ""]
              DatabasePortValue: !If [CreateManagedDatabase, !GetAtt Database.Endpoint.Port, ""]
              OpenSearchHost: !If
                - HasExternalOpenSearch
                - !Ref OpenSearchHost
                - !If
                  - UseManagedOpenSearch
                  - !Sub "https://${OpenSearchDomain.DomainEndpoint}"
                  - !If [UseContainerOpenSearch, "http://opensearch:9200", ""]
              # 명시적 \n 문자열로 조립한다 — YAML 블록 스칼라(|)의 공통 들여쓰기 제거 규칙과
              # 겹치면 결과 docker-compose.yml의 들여쓰기가 미묘하게 어긋나기 쉬워서, 각 줄의
              # 절대 들여쓰기를 여기서 명시적으로 고정해 둔다.
              RagSchedulerProvider: !If [CreateRagIngestScheduler, "eventbridge-sqs", "local"]
              RagIngestQueueUrl: !If
                - CreateRagIngestScheduler
                - !GetAtt RagIngestSchedulerStack.Outputs.QueueUrl
                - ""
              RagIngestQueueArn: !If
                - CreateRagIngestScheduler
                - !GetAtt RagIngestSchedulerStack.Outputs.QueueArn
                - ""
              OpenSearchComposeBlock: !If
                - UseContainerOpenSearch
                - "  opensearch:\n    image: opensearchproject/opensearch:2.13.0\n    container_name: a360-opensearch\n    restart: unless-stopped\n    environment:\n      discovery.type: single-node\n      plugins.security.disabled: \"true\"\n      OPENSEARCH_JAVA_OPTS: \"-Xms512m -Xmx512m\"\n    volumes:\n      - opensearch-data:/usr/share/opensearch/data\n    healthcheck:\n      test: [\"CMD-SHELL\", \"curl -sf http://localhost:9200/_cluster/health || exit 1\"]\n      interval: 10s\n      timeout: 5s\n      retries: 10\n\nvolumes:\n  opensearch-data:"
                - ""

  AppAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    CreationPolicy:
      ResourceSignal:
        Count: !Ref DesiredCapacity
        Timeout: PT30M
    UpdatePolicy:
      AutoScalingRollingUpdate:
        MinInstancesInService: 1
        MaxBatchSize: 1
        PauseTime: PT15M
        WaitOnResourceSignals: true
    Properties:
      MinSize: "1"
      DesiredCapacity: !Ref DesiredCapacity
      MaxSize: !Ref MaxCapacity
      VPCZoneIdentifier: !If
        - IsPublicLite
        - [!Ref PublicSubnet1, !Ref PublicSubnet2]
        - [!Ref PrivateAppSubnet1, !Ref PrivateAppSubnet2]
      TargetGroupARNs:
        - !Ref BackendTargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      LaunchTemplate:
        LaunchTemplateId: !Ref AppLaunchTemplate
        Version: !GetAtt AppLaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-app"
          PropagateAtLaunch: true
        - Key: Project
          Value: !Ref ProjectName
          PropagateAtLaunch: true
        - Key: Environment
          Value: !Ref Environment
          PropagateAtLaunch: true

Outputs:
  AlbDnsName:
    Description: Public ALB DNS name for backend API
    Value: !GetAtt ApplicationLoadBalancer.DNSName

  BackendHttpUrl:
    Description: Backend HTTP URL
    Value: !Sub "http://${ApplicationLoadBalancer.DNSName}"

  BackendCloudFrontUrl:
    Description: Backend HTTPS URL via CloudFront (use this from the Vercel frontend)
    Value: !Sub "https://${AppCloudFrontDistribution.DomainName}"

  BackendHttpsUrl:
    Condition: HasCertificate
    Description: Backend HTTPS URL
    Value: !Sub "https://${ApplicationLoadBalancer.DNSName}"

  DatabaseEndpoint:
    Condition: CreateManagedDatabase
    Description: Private PostgreSQL endpoint
    Value: !GetAtt Database.Endpoint.Address

  DatabaseSecretArn:
    Condition: CreateManagedDatabase
    Description: Secrets Manager ARN containing DB credentials
    Value: !Ref DatabaseSecret

  DocumentBucketName:
    Description: S3 bucket for source and processed documents
    Value: !Ref DocumentBucket

  OpenSearchEndpoint:
    Condition: UseManagedOpenSearch
    Description: Private OpenSearch endpoint
    Value: !Sub "https://${OpenSearchDomain.DomainEndpoint}"

  RagIngestQueueUrl:
    Condition: CreateRagIngestScheduler
    Description: SQS queue URL consumed by the local rag ingest consumer
    Value: !GetAtt RagIngestSchedulerStack.Outputs.QueueUrl

  RagIngestQueueArn:
    Condition: CreateRagIngestScheduler
    Description: SQS queue ARN targeted by EventBridge Scheduler
    Value: !GetAtt RagIngestSchedulerStack.Outputs.QueueArn

  RagIngestSchedulerRoleArn:
    Condition: CreateRagIngestScheduler
    Description: IAM role used by EventBridge Scheduler to send SQS messages
    Value: !GetAtt RagIngestSchedulerStack.Outputs.SchedulerRoleArn

  SsmSessionHint:
    Description: Use SSM Session Manager to access private EC2 instances
    Value: !Sub "aws ssm start-session --target <instance-id> --region ${AWS::Region}"
