# pytest 단위 테스트 — PR마다 실행해 서비스 로직 회귀를 방지한다
name: Tests

on:
  pull_request:
  push:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # PR의 파이썬 코드를 실행하는 잡 — 체크아웃 토큰을 .git/config에 남기지 않아
          # 코드가 토큰을 읽어 유출하는 것 방지(RPA-121).
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests with coverage
        run: pytest -q --cov=app --cov-report=term-missing --cov-report=xml
      - name: Coverage summary
        if: always()
        run: |
          {
            echo "### 🧪 테스트 커버리지"
            echo '```'
            coverage report
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
