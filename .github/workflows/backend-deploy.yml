name: backend-deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "CloudFormation environment"
        required: true
        default: dev
      deploy_stack:
        description: "Deploy CloudFormation stack after image push"
        required: true
        type: boolean
        default: false
      network_mode:
        description: "private (NAT Gateway, ~$32-45/mo fixed) or public-lite (no NAT, cheaper short test deploys)"
        required: true
        type: choice
        options:
          - private
          - public-lite
        default: private
      instance_type:
        description: "EC2 instance type for the app Auto Scaling Group"
        required: true
        default: t3.medium
      desired_capacity:
        description: "Desired app instance count"
        required: true
        default: "1"
      max_capacity:
        description: "Max app instance count"
        required: true
        default: "2"
      enable_rag_ingest_scheduler:
        description: "Create EventBridge Scheduler -> SQS nested stack for rag ingest"
        required: true
        type: boolean
        default: false
      rag_ingest_schedule_expression:
        description: "RAG ingest schedule expression. Start with rate(1 minute), then switch to cron(...)."
        required: true
        default: "rate(1 minute)"
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  STACK_NAME: a360-assistant-dev

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        run: |
          IMAGE_NAME="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/backend"
          IMAGE_URI="${IMAGE_NAME}:${GITHUB_SHA}"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_uri }}
            ${{ steps.meta.outputs.image_name }}:latest

  deploy:
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_stack == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload nested CloudFormation templates
        id: nested
        if: inputs.enable_rag_ingest_scheduler == true
        run: |
          NESTED_BUCKET="${{ secrets.CFN_ARTIFACT_BUCKET }}"
          if [ -z "$NESTED_BUCKET" ]; then
            echo "CFN_ARTIFACT_BUCKET secret is required when enable_rag_ingest_scheduler=true" >&2
            exit 1
          fi
          KEY="cloudformation/${STACK_NAME}/${GITHUB_SHA}/rag-ingest-scheduler-sqs.yaml"
          aws s3 cp "infra/rag-ingest-scheduler-sqs.yaml" "s3://${NESTED_BUCKET}/${KEY}"
          echo "rag_scheduler_template_url=https://${NESTED_BUCKET}.s3.${AWS_REGION}.amazonaws.com/${KEY}" >> "$GITHUB_OUTPUT"

      - name: Deploy CloudFormation
        run: |
          aws cloudformation deploy \
            --stack-name "${STACK_NAME}" \
            --template-file infra/a360-backend-private.yml \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              Environment="${{ inputs.environment || 'dev' }}" \
              ContainerImage="${{ needs.build.outputs.image_uri }}" \
              FrontendOrigins="${{ secrets.FRONTEND_ORIGINS }}" \
              OpenAiApiKey="${{ secrets.OPENAI_API_KEY }}" \
              VoyageApiKey="${{ secrets.VOYAGE_API_KEY }}" \
              JwtSecret="${{ secrets.JWT_SECRET }}" \
              GithubToken="${{ secrets.GHCR_READ_TOKEN }}" \
              RagDatabaseUrl="${{ secrets.RAG_DATABASE_URL }}" \
              ObservabilityDatabaseUrl="${{ secrets.OBSERVABILITY_DATABASE_URL }}" \
              OpenSearchHost="${{ secrets.OPENSEARCH_HOST }}" \
              OpenSearchUsername="${{ secrets.OPENSEARCH_USERNAME }}" \
              OpenSearchPassword="${{ secrets.OPENSEARCH_PASSWORD }}" \
              EnableOpenSearch="${{ vars.ENABLE_OPENSEARCH || 'false' }}" \
              OpenSearchMode="${{ vars.OPENSEARCH_MODE || 'managed' }}" \
              NetworkMode="${{ inputs.network_mode || 'public-lite' }}" \
              InstanceType="${{ inputs.instance_type || 't3.medium' }}" \
              DesiredCapacity="${{ inputs.desired_capacity || '1' }}" \
              MaxCapacity="${{ inputs.max_capacity || '2' }}" \
              EnableRagIngestScheduler="${{ inputs.enable_rag_ingest_scheduler && 'true' || 'false' }}" \
              RagIngestSchedulerTemplateUrl="${{ steps.nested.outputs.rag_scheduler_template_url }}" \
              RagIngestScheduleExpression="${{ inputs.rag_ingest_schedule_expression || 'rate(1 minute)' }}"
