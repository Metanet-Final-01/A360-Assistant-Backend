name: backend-deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "CloudFormation environment"
        required: true
        default: dev
      deploy_stack:
        description: "Deploy CloudFormation stack after image push"
        required: true
        type: boolean
        default: false
      instance_type:
        description: "EC2 instance type for the app Auto Scaling Group"
        required: true
        default: t3.medium
      desired_capacity:
        description: "Desired app instance count"
        required: true
        default: "1"
      max_capacity:
        description: "Max app instance count"
        required: true
        default: "2"
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  STACK_NAME: a360-assistant-dev-backend

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        run: |
          IMAGE_NAME="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/backend"
          IMAGE_URI="${IMAGE_NAME}:${GITHUB_SHA}"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_uri }}
            ${{ steps.meta.outputs.image_name }}:latest

  deploy:
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_stack == true
    runs-on: ubuntu-latest
    environment: change-assurance-writer
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate Ops API credential
        env:
          OPS_API_KEY: ${{ secrets.OPS_API_KEY }}
        run: |
          if [ -z "$OPS_API_KEY" ]; then
            echo "OPS_API_KEY secret is required for the deployed Backoffice integration." >&2
            exit 1
          fi

      - name: Deploy CloudFormation
        run: |
          aws cloudformation deploy \
            --stack-name "${STACK_NAME}" \
            --template-file infra/a360-backend-private.yml \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              Environment="${{ inputs.environment }}" \
              ContainerImage="${{ needs.build.outputs.image_uri }}" \
              FrontendOrigins="${{ secrets.FRONTEND_ORIGINS }}" \
              OpenAiApiKey="${{ secrets.OPENAI_API_KEY }}" \
              VoyageApiKey="${{ secrets.VOYAGE_API_KEY }}" \
              JwtSecret="${{ secrets.JWT_SECRET }}" \
              GithubToken="${{ secrets.GHCR_READ_TOKEN }}" \
              OpsApiKey="${{ secrets.OPS_API_KEY }}" \
              AssuranceWriterToken="${{ secrets.ASSURANCE_WRITER_TOKEN }}" \
              AssuranceWriterRepository="${{ github.repository }}" \
              InstanceType="${{ inputs.instance_type || 't3.medium' }}" \
              DesiredCapacity="${{ inputs.desired_capacity || '1' }}" \
              MaxCapacity="${{ inputs.max_capacity || '2' }}"
