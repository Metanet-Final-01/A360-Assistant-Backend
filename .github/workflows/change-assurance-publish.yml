name: Change Assurance Publisher

on:
  workflow_run:
    workflows: ["Change Assurance (Observe)"]
    types: [completed]

permissions:
  actions: read
  contents: read

concurrency:
  group: change-assurance-publish-${{ github.event.workflow_run.id }}-${{ github.event.workflow_run.run_attempt }}
  cancel-in-progress: false

jobs:
  publish:
    name: Validate and persist Change record
    if: >-
      ${{ vars.ASSURANCE_WRITER_ENABLED == 'true' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'pull_request' &&
          github.event.workflow_run.pull_requests[0].number != null }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: change-assurance-writer
    steps:
      - name: Check out the trusted default-branch publisher
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          persist-credentials: false

      - name: Use Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Download evidence from the completed Observe run
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: change-assurance-pr-${{ github.event.workflow_run.pull_requests[0].number }}-${{ github.event.workflow_run.run_attempt }}
          path: ${{ runner.temp }}/change-assurance
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Revalidate and publish the Change record
        env:
          ASSURANCE_WRITER_TOKEN: ${{ secrets.ASSURANCE_WRITER_TOKEN }}
          ASSURANCE_WRITER_URL: ${{ vars.ASSURANCE_WRITER_URL }}
        run: >-
          python scripts/publish_change_assurance.py
          --event "$GITHUB_EVENT_PATH"
          --artifacts "$RUNNER_TEMP/change-assurance"
          --repository "$GITHUB_REPOSITORY"
          --url "$ASSURANCE_WRITER_URL"
