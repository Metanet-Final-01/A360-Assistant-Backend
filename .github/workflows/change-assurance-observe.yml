name: Change Assurance (Observe)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: change-assurance-observe-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  observe:
    name: Derive assurance evidence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Use Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Run Change Assurance without installing PR dependencies
        env:
          ASSURANCE_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          ASSURANCE_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ASSURANCE_REPOSITORY: ${{ github.repository }}
          ASSURANCE_OUTPUT: ${{ runner.temp }}/change-assurance-${{ github.run_id }}-${{ github.run_attempt }}
        run: >-
          python -m assurance.change.cli
          --repo .
          --base-sha "$ASSURANCE_BASE_SHA"
          --head-sha "$ASSURANCE_HEAD_SHA"
          --repository "$ASSURANCE_REPOSITORY"
          --output "$ASSURANCE_OUTPUT"

      - name: Upload Observe evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: change-assurance-pr-${{ github.event.pull_request.number }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/change-assurance-${{ github.run_id }}-${{ github.run_attempt }}/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14
