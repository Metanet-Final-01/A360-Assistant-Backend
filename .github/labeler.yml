# PR 변경 파일 경로 → area 라벨 매핑 (.github/workflows/pr-labeler.yml이 사용)
# 여러 영역을 건드리면 라벨이 여러 개 붙는다 (의도된 동작)

area:backend:
  - changed-files:
      - any-glob-to-any-file:
          - "app/**"

area:rag:
  - changed-files:
      - any-glob-to-any-file:
          - "app/ingest/**"

area:agent:
  - changed-files:
      - any-glob-to-any-file:
          - "app/agent/**"

area:db:
  - changed-files:
      - any-glob-to-any-file:
          - "app/db.py"
          - "app/models.py"
          - "app/schemas/**"
          - "infra/seed/**"

area:infra:
  - changed-files:
      - any-glob-to-any-file:
          - "infra/**"
          - "Dockerfile"
          - "docker-compose.yml"

area:ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - ".github/labeler.yml"

area:docs:
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
          - "*.md"
