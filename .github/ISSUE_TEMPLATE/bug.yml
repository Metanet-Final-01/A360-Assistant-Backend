name: "🐛 버그 리포트"
description: "동작하지 않거나 예상과 다른 동작"
title: "[bug] "
labels: ["버그"]
body:
  - type: textarea
    id: what
    attributes:
      label: 어떤 문제인가요?
      placeholder: "PDF 업로드 시 표 안의 텍스트 순서가 뒤섞여 추출됨"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 재현 방법
      placeholder: |
        1. 샘플 업무정의서 PDF 업로드
        2. /api/documents/{id}/content 조회
        3. Task3 표의 셀 순서가 뒤바뀜
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: 환경 / 로그
      placeholder: "로컬 docker-compose / 에러 로그 붙여넣기"
    validations:
      required: false
