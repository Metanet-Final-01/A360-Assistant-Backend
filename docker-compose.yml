services:
  backend:
    build: .
    container_name: a360-backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-a360}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-a360_admin}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-a360_local_password}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    container_name: a360-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-a360_admin}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-a360_local_password}
      POSTGRES_DB: ${DATABASE_NAME:-a360}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - a360-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-a360_admin} -d ${DATABASE_NAME:-a360}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  a360-postgres-data:
