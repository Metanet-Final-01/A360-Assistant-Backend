services:
  backend:
    build: .
    container_name: a360-backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-a360}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-a360_admin}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-a360_local_password}
      OPENSEARCH_HOST: ${OPENSEARCH_HOST:-http://opensearch:9200}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    container_name: a360-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-a360_admin}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-a360_local_password}
      POSTGRES_DB: ${DATABASE_NAME:-a360}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - a360-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-a360_admin} -d ${DATABASE_NAME:-a360}"]
      interval: 5s
      timeout: 5s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: a360-opensearch
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      # 2.12+ 보안 플러그인 데모 설치 스크립트가 security.disabled 여부와 무관하게 요구함 (로컬 전용, 실제 인증엔 안 쓰임)
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "A360-local-Dev1!"
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - a360-opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  a360-postgres-data:
  a360-opensearch-data:
