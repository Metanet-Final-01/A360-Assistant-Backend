services:
  backend:
    build: .
    container_name: a360-backend
    # .env 전체를 컨테이너로 주입한다 — JWT_SECRET·OPENAI_MODEL·VISION_* 등 모든 설정이
    # 자동으로 들어가 "환경변수를 개별로 나열해야 하는" 누락 실수를 없앤다. .env가 없어도
    # 기동은 되도록 required:false (그 경우 시크릿은 셸/시스템 환경변수에서 온다).
    env_file:
      - path: .env
        required: false
    environment:
      # 컨테이너 내부 네트워킹만 오버라이드 — .env는 호스트 CLI용(localhost/외부 포트)이라
      # 컨테이너 안에서는 서비스명·내부 포트로 고정해야 한다 (env_file 값을 여기서 덮어씀).
      DATABASE_HOST: db
      DATABASE_PORT: "5432"           # 컨테이너↔db는 내부 5432 (호스트 매핑 포트 5433과 무관)
      OPENSEARCH_HOST: http://opensearch:9200
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    container_name: a360-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-a360_admin}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-a360_local_password}
      POSTGRES_DB: ${DATABASE_NAME:-a360}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - a360-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-a360_admin} -d ${DATABASE_NAME:-a360}"]
      interval: 5s
      timeout: 5s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: a360-opensearch
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      # 2.12+ 보안 플러그인 데모 설치 스크립트가 security.disabled 여부와 무관하게 요구함 (로컬 전용, 실제 인증엔 안 쓰임)
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "A360-local-Dev1!"
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - a360-opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  a360-postgres-data:
  a360-opensearch-data:
