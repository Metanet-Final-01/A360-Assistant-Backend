ownership_note: 'app/agent/** is owned by the Agent maintainer. Backend reads and audits it, never modifies it, and never
  imports private modules (harness-lint HL-06). The R1-R8 checker and repair are Agent-owned producer quality control. CORRECTED
  IN v1.3: the public stream_agent_turn done data DOES include violations (app/agent/orchestrator/graph.py:113); ProgressEvent.data
  is dict[str, Any] so it is untyped, no interface doc specifies it, and app/api/sessions.py rebuilds the external response
  without it. Producer advisory is therefore de facto available to Backend at the public function boundary but has no formal
  contract. Backend consumes it through a Backend-owned adapter over that PUBLIC boundary; it is optional, non-authoritative,
  and never required to agree with boundary_enforcement. Re-verified at HEAD 50687eb26144ebc3dfd6c6aa22262b09199986a2 (branch
  test/RPA-168-recommendation-integration-db): app/agent/** HAS changed since the baseline via PR #229 (RPA-162, 8 files)
  — that is the Agent owner''s own work, not Backend''s. The Backend boundary facts still hold at that SHA: graph.py:113 still
  emits violations, sessions.py still drops them, and no private app.agent import exists outside app/agent/**.'
integrity_note: Control id uniqueness, registry membership, diff-derived applicability, manifest/report binding, policy-derived
  required controls, completeness reconciliation, cross-report subject binding, waiver resolution, blocking-policy binding
  and the private-import prohibition are NOT expressible in JSON Schema. They are enforced by harness-lint (HL-01..HL-16).
  harness-lint does not run in CI yet, so referential integrity remains Probable-by-construction, never Confirmed. Static
  wiring evidence (evidence_kind=static_code) does not prove runtime execution, and no live_operational evidence (branch protection,
  deployed network) exists in this review.
